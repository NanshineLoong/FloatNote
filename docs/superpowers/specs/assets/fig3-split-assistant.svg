  <rect x="378" y="130" width="100" height="7" rx="3" fill="#f1efe8"/>
  <rect x="378" y="144" width="166" height="7" rx="3" fill="#f1efe8"/>
  <rect x="378" y="158" width="140" height="7" rx="3" fill="#f1efe8"/>
  <rect x="378" y="172" width="70" height="7" rx="3" fill="#f1efe8"/>

  <circle cx="534" cy="200" r="18" fill="#f1efe8" stroke="#cfccc3"/>
  <circle cx="528" cy="198" r="2" fill="#6b6a64"/><circle cx="534" cy="198" r="2" fill="#6b6a64"/><circle cx="540" cy="198" r="2" fill="#6b6a64"/>

  <text class="cap" x="340" y="254" text-anchor="middle">分屏时：右侧 = 成品栏，助手落回右下角浮层</text>
