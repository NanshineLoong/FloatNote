<svg width="100%" viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, Segoe UI, sans-serif">
  <title>分屏整理模式：左 Inbox 右成品，成品可切换多文件并重命名，AI 助手浮在右下角</title>
  <style>
    .cap{font-size:13px;fill:#6b6a64}
    .hd{font-size:10px;fill:#9a9890}
    .pill{font-size:11px;fill:#2c2c2a}
    .tx{font-size:12px;fill:#2c2c2a}
    .sm{font-size:10px;fill:#0f6e56}
  </style>

  <rect x="120" y="28" width="440" height="200" rx="12" fill="#ffffff" stroke="#e3e1d9"/>
  <circle cx="138" cy="46" r="3.5" fill="#d3d1c7"/><circle cx="150" cy="46" r="3.5" fill="#d3d1c7"/><circle cx="162" cy="46" r="3.5" fill="#d3d1c7"/>
  <line x1="120" y1="62" x2="560" y2="62" stroke="#ece9e1"/>

  <rect x="136" y="72" width="86" height="20" rx="6" fill="#f1efe8"/>
  <text class="pill" x="146" y="86">阅读笔记</text>
  <rect x="476" y="72" width="20" height="20" rx="5" fill="#e1f5ee" stroke="#1d9e75"/>
  <rect x="502" y="72" width="20" height="20" rx="5" fill="#f1efe8"/>
  <rect x="528" y="72" width="20" height="20" rx="5" fill="#f1efe8"/>

  <line x1="360" y1="102" x2="360" y2="216" stroke="#ece9e1"/>
  <text class="hd" x="138" y="118">INBOX</text>
  <rect x="136" y="126" width="200" height="32" rx="6" fill="#e1f5ee"/>
  <rect x="136" y="126" width="3" height="32" fill="#1d9e75"/>
  <text class="sm" x="150" y="140">mdn</text>
