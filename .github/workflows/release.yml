name: Release preview

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  prepare_release:
    name: Validate tag and prepare prerelease
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - name: Verify release tag and commit
        run: |
          set -euo pipefail
          npm run version:check -- --tag "$RELEASE_TAG"
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          tag_commit=$(git rev-list -n 1 "$RELEASE_TAG")
          head_commit=$(git rev-parse HEAD)
          if [ "$tag_commit" != "$head_commit" ]; then
            echo "Tag $RELEASE_TAG does not point to checked-out commit $head_commit" >&2
            exit 1
          fi
          echo "TAG_COMMIT=$tag_commit" >> "$GITHUB_ENV"
      - name: Create or reuse prerelease
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          releases_endpoint="repos/$GITHUB_REPOSITORY/releases?per_page=100"
          release_info=$(gh api --paginate "$releases_endpoint" \
            --jq ".[] | select(.tag_name == \"$RELEASE_TAG\") | [.id, .draft, .prerelease] | @tsv")
          if [ -n "$release_info" ]; then
            IFS=$'\t' read -r release_id is_draft is_prerelease <<< "$release_info"
            if [ "$is_prerelease" != "true" ]; then
              echo "Existing release $RELEASE_TAG must remain a prerelease" >&2
              exit 1
            fi
          else
            release_info=$(gh api --method POST "repos/$GITHUB_REPOSITORY/releases" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$TAG_COMMIT" \
              -f name="FloatNote $RELEASE_TAG" \
              -F body=@.github/release-preview-notes.md \
              -F draft=true \
              -F prerelease=true \
              -F generate_release_notes=true \
              --jq '[.id, .draft, .prerelease] | @tsv')
            IFS=$'\t' read -r release_id is_draft is_prerelease <<< "$release_info"
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build-macos:
    name: macOS ${{ matrix.arch }}
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-15
            target: aarch64-apple-darwin
          - arch: x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
      - run: npm ci
      - name: Verify release version
        run: npm run version:check -- --tag "$RELEASE_TAG"
      - name: Run project checks
        run: npm run check
      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/floatnote-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE" \
            | openssl base64 -d -A \
              -out "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security default-keychain -s "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          identities="$(
            security find-identity -v -p codesigning "$keychain_path" \
              | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p'
          )"
          identity_count="$(printf '%s\n' "$identities" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$identity_count" -ne 1 ]; then
            echo "Expected exactly one Developer ID Application identity, found $identity_count." >&2
            security find-identity -v -p codesigning "$keychain_path"
            exit 1
          fi

          signing_identity="$(printf '%s\n' "$identities" | head -n 1)"
          case "$signing_identity" in
            *"($APPLE_TEAM_ID)") ;;
            *)
              echo "Developer ID identity does not belong to configured APPLE_TEAM_ID." >&2
              exit 1
              ;;
          esac

          echo "Using Developer ID Application identity for Team ID $APPLE_TEAM_ID."
          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"
          rm -f "$certificate_path"

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          api_key_directory="$RUNNER_TEMP/private_keys"
          api_key_path="$api_key_directory/AuthKey_${APPLE_API_KEY_ID}.p8"
          mkdir -p "$api_key_directory"
          printf '%s' "$APPLE_API_PRIVATE_KEY" \
            | openssl base64 -d -A \
              -out "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Build signed app and DMG
        uses: tauri-apps/tauri-action@v1
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }} --bundles dmg

      - name: Notarize and verify release artifacts
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail

          app_path="src-tauri/target/${{ matrix.target }}/release/bundle/macos/FloatNote.app"
          dmg_directory="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          dmg_paths=("$dmg_directory"/*.dmg)

          if [ ! -d "$app_path" ]; then
            echo "Application bundle not found at $app_path." >&2
            exit 1
          fi
          if [ "${#dmg_paths[@]}" -ne 1 ] || [ ! -f "${dmg_paths[0]}" ]; then
            echo "Expected exactly one DMG in $dmg_directory." >&2
            exit 1
          fi
          dmg_path="${dmg_paths[0]}"

          xcrun notarytool submit "$dmg_path" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dmg_path"

          codesign --verify --deep --strict --verbose=2 "$app_path"
          signing_details="$(codesign -dvvv "$app_path" 2>&1)"
          printf '%s\n' "$signing_details"
          printf '%s\n' "$signing_details" \
            | grep -F "Authority=Developer ID Application:"
          printf '%s\n' "$signing_details" \
            | grep -F "TeamIdentifier=$APPLE_TEAM_ID"

          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          codesign --verify --verbose=2 "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl --assess \
            --type open \
            --context context:primary-signature \
            --verbose=4 \
            "$dmg_path"

          app_version="$(node -e \
            'console.log(JSON.parse(require("fs").readFileSync("package.json", "utf8")).version)')"
          asset_directory="$RUNNER_TEMP/release-assets"
          dmg_asset_path="$asset_directory/FloatNote_${app_version}_${{ matrix.arch }}.dmg"
          app_archive_path="$asset_directory/FloatNote_${app_version}_${{ matrix.arch }}.app.tar.gz"
          mkdir -p "$asset_directory"
          cp "$dmg_path" "$dmg_asset_path"
          tar -czf "$app_archive_path" \
            -C "$(dirname "$app_path")" \
            "$(basename "$app_path")"
          echo "DMG_ASSET_PATH=$dmg_asset_path" >> "$GITHUB_ENV"
          echo "APP_ARCHIVE_PATH=$app_archive_path" >> "$GITHUB_ENV"

      - name: Upload verified release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare_release.outputs.release_id }}
        run: |
          set -euo pipefail

          upload_url="$(
            gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq '.upload_url'
          )"
          upload_base="$(printf '%s\n' "$upload_url" | sed 's/{.*$//')"

          for asset_path in "$DMG_ASSET_PATH" "$APP_ARCHIVE_PATH"; do
            asset_name="$(basename "$asset_path")"
            encoded_asset_name="$(node -e \
              'process.stdout.write(encodeURIComponent(process.argv[1]))' \
              "$asset_name")"
            existing_asset_ids="$(
              gh api --paginate \
                "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100" \
                --jq ".[] | select(.name == \"$asset_name\") | .id"
            )"
            for asset_id in $existing_asset_ids; do
              gh api --method DELETE \
                "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
            done

            case "$asset_path" in
              *.dmg) content_type="application/x-apple-diskimage" ;;
              *.tar.gz) content_type="application/gzip" ;;
              *)
                echo "Unsupported release asset: $asset_path" >&2
                exit 1
                ;;
            esac

            response_path="$RUNNER_TEMP/upload-response.json"
            status_code="$(
              curl --silent --show-error --location \
                --request POST \
                --retry 3 \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                --header "Content-Type: $content_type" \
                --data-binary "@$asset_path" \
                --output "$response_path" \
                --write-out '%{http_code}' \
                "$upload_base?name=$encoded_asset_name"
            )"
            if [ "$status_code" != "201" ]; then
              echo "Failed to upload $asset_name (HTTP $status_code)." >&2
              cat "$response_path" >&2
              exit 1
            fi
            uploaded_name="$(node -e \
              'console.log(JSON.parse(require("fs").readFileSync(process.argv[1], "utf8")).name)' \
              "$response_path")"
            if [ "$uploaded_name" != "$asset_name" ]; then
              echo "GitHub renamed $asset_name to $uploaded_name." >&2
              exit 1
            fi
            echo "Uploaded $asset_name to prerelease $RELEASE_TAG."
          done
