<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 140" role="img" aria-labelledby="title desc">
  <title id="title">悬浮桌面宠物机器人动画</title>
  <desc id="desc">一个带有悬浮、轻微立体感、眨眼和屏幕扫光效果的机器人 SVG 动画。</desc>
  <defs>
    <style><![CDATA[
      .desktop-pet {
        transform-box: view-box;
        transform-origin: 72px 72px;
        animation: hoverFloat 3.35s ease-in-out infinite;
        filter: url(#petDepthShadow);
      }

      .pet-shadow {
        transform-box: fill-box;
        transform-origin: center;
        animation: groundShadow 3.35s ease-in-out infinite;
      }

      .hover-ring {
        transform-box: fill-box;
        transform-origin: center;
        animation: ringPulse 3.35s ease-in-out infinite;
      }

      .screen-glow {
        opacity: .16;
        animation: screenPulse 2.6s ease-in-out infinite;
      }

      .eye {
        transform-box: fill-box;
        transform-origin: center;
        animation: blink 5.2s ease-in-out infinite;
      }
      .eye.right { animation-delay: 0s; }

      .screen-glint {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
        animation: glintSweep 4.1s ease-in-out infinite;
      }

      .top-highlight {
        opacity: .52;
        animation: shellBreath 3.35s ease-in-out infinite;
      }

      .rim-light {
        opacity: .28;
        animation: rimGlow 3.35s ease-in-out infinite;
      }

      .particle {
        opacity: 0;
        animation: sparkleUp 3.8s ease-in-out infinite;
      }
      .particle.p2 { animation-delay: 1.1s; }
      .particle.p3 { animation-delay: 2.2s; }

      @keyframes hoverFloat {
        0%, 100% { transform: translateY(0) rotate(-.45deg) scale(1); }
        50% { transform: translateY(-7px) rotate(.55deg) scale(1.012); }
      }

      @keyframes groundShadow {
        0%, 100% { transform: scaleX(.88) scaleY(.82); opacity: .32; }
        50% { transform: scaleX(1.08) scaleY(.92); opacity: .18; }
      }

      @keyframes ringPulse {
        0%, 100% { transform: scale(.92); opacity: .16; }
        50% { transform: scale(1.06); opacity: .3; }
      }

      @keyframes screenPulse {
        0%, 100% { opacity: .22; }
        50% { opacity: .42; }
      }

      @keyframes blink {
        0%, 44%, 48%, 100% { transform: scaleY(1); opacity: 1; }
        45%, 47% { transform: scaleY(.13); opacity: .68; }
      }

      @keyframes glintSweep {
        0%, 28% { transform: translateX(-56px) skewX(-18deg); opacity: 0; }
        38% { opacity: .62; }
        52% { transform: translateX(58px) skewX(-18deg); opacity: 0; }
        100% { transform: translateX(58px) skewX(-18deg); opacity: 0; }
      }

      @keyframes shellBreath {
        0%, 100% { opacity: .43; }
        50% { opacity: .68; }
      }

      @keyframes rimGlow {
        0%, 100% { opacity: .2; }
        50% { opacity: .38; }
      }

      @keyframes sparkleUp {
        0% { transform: translateY(5px) scale(.6); opacity: 0; }
        25% { opacity: .45; }
        55% { transform: translateY(-8px) scale(1); opacity: .3; }
        100% { transform: translateY(-15px) scale(.55); opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .desktop-pet, .pet-shadow, .hover-ring, .screen-glow, .eye, .screen-glint,
        .top-highlight, .rim-light, .particle { animation: none; }
      }
    ]]></style>

    <linearGradient id="shellGradient" x1="23" x2="120.9" y1="68.2" y2="68.2" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaf3ff"/>
      <stop offset=".23" stop-color="#cbd7ea"/>
      <stop offset=".62" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#dce7f8"/>
    </linearGradient>

    <radialGradient id="faceBezelGradient" cx="70.95" cy="42.85" r="41.08" gradientUnits="userSpaceOnUse">
      <stop offset=".22" stop-color="#ffffff"/>
      <stop offset=".62" stop-color="#eef3fb"/>
      <stop offset="1" stop-color="#c7cbd6"/>
    </radialGradient>

    <linearGradient id="leftCyanRim" x1="24.24" x2="26.06" y1="68.5" y2="68.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#96DDFB"/>
      <stop offset="1" stop-color="#CEFFFF"/>
    </linearGradient>

    <linearGradient id="rightEarGradient" x1="123.6" x2="112.03" y1="67.44" y2="81.3" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFEFE"/>
      <stop offset="1" stop-color="#CCD0DA"/>
    </linearGradient>

    <linearGradient id="leftEarGradient" x1="24.4" x2="31.19" y1="68" y2="68.83" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EBEBEF"/>
      <stop offset="1" stop-color="#BDC1CB"/>
    </linearGradient>

    <linearGradient id="rightCyanRim" x1="118.7" x2="121.1" y1="68.65" y2="68.65" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CEFFFF"/>
      <stop offset="1" stop-color="#AFECFF"/>
    </linearGradient>

    <linearGradient id="screenGradient" x1="39.83" x2="103.6" y1="67.7" y2="67.7" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F162E"/>
      <stop offset=".52" stop-color="#2A3156"/>
      <stop offset="1" stop-color="#0C1534"/>
    </linearGradient>

    <linearGradient id="rightEyeGradient" x1="82.43" x2="91.87" y1="67.81" y2="67.81" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B2F2FF" stop-opacity=".55"/>
      <stop offset="1" stop-color="#BBFFFF"/>
    </linearGradient>

    <linearGradient id="leftEyeGradient" x1="51.93" x2="61.37" y1="67.81" y2="67.81" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ABEFFE" stop-opacity=".55"/>
      <stop offset="1" stop-color="#BAFFFE"/>
    </linearGradient>

    <radialGradient id="shadowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#4f607b" stop-opacity=".42"/>
      <stop offset=".58" stop-color="#8ea5c8" stop-opacity=".18"/>
      <stop offset="1" stop-color="#8ea5c8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="highlightGradient" x1="40" x2="103" y1="33" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".86"/>
      <stop offset=".5" stop-color="#ffffff" stop-opacity=".16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="glintGradient" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset=".48" stop-color="#ffffff" stop-opacity=".86"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="petDepthShadow" x="-25%" y="-30%" width="150%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blurShadow"/>
      <feOffset in="blurShadow" dx="0" dy="5" result="offsetShadow"/>
      <feFlood flood-color="#60708d" flood-opacity=".30" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetShadow" operator="in" result="shadow"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="rimBlur"/>
      <feOffset in="rimBlur" dx="-1.1" dy="-1.2" result="rimOffset"/>
      <feFlood flood-color="#ffffff" flood-opacity=".34" result="rimColor"/>
      <feComposite in="rimColor" in2="rimOffset" operator="in" result="rim"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="rim"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="screenClip">
      <path d="m72 48c-13.1 0-19.9 1.4-24.1 4s-8 6.6-8 15c0 12.7 10.1 17.2 31.1 17.2 16 0 32.5-1 32.5-15.7 0-7.4-2.1-12.6-7.9-16.2-4.2-2.6-10.6-4.3-23.6-4.3z"/>
    </clipPath>
  </defs>

  <g class="ambient" aria-hidden="true">
    <ellipse class="hover-ring" cx="72" cy="118.5" rx="45" ry="14" fill="none" stroke="#9beaff" stroke-opacity=".34" stroke-width="1.2" stroke-dasharray="5 8"/>
  </g>

  <g class="desktop-pet">
    <path class="cls-1" fill="url(#shellGradient)" d="m30.3 52c4.5-13 18.9-27.7 41.7-27.7s38 12.2 41.7 27.7c2-0.1 5.9 3.2 6.8 7.9 1 9.1-2.5 19.2-5.5 22.7-2.9 13.5-15.8 33.4-43 33.4s-39.7-16.3-43.5-33.4c-4.6-3.4-7.4-19.4-2.5-26.6 1.6-2.4 3.6-4 4.3-4z"/>
    <path class="top-highlight" fill="url(#highlightGradient)" d="m38.8 51.4c6-12.1 18.8-20 33.2-20 13.8 0 26 6.6 31.9 17.1-6.4-3.9-17.3-6.2-31.8-6.2-14.9 0-25.7 2.9-33.3 9.1z"/>
    <path class="cls-2" fill="url(#faceBezelGradient)" d="m35.8 68c-0.1-9 5.3-17.8 15.1-20.7 6.7-2.1 13.1-2.7 21.1-2.7s14 0.4 19.2 1.5c11.9 2.9 16.8 11.6 17 20.6 0.3 12.6-8.2 19.3-20.1 20.5-6.3 0.7-11.1 0.9-16.1 0.9-5.3 0-9.8-0.1-14.4-0.6-10.8-1.3-21.7-6.3-21.8-19.5z"/>
    <path class="rim-light" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" d="m42.8 54.2c6.5-5.6 14.4-7.1 29.2-7.1 15.4 0 23.1 1.8 29 7.4"/>
    <path class="cls-3" fill="url(#leftCyanRim)" d="m25 57.1c-2 3.9-2 11.3-1.2 17.8l0.8 3 1.5 2.2c-1.1-2.5-2-17.8-1.1-23z"/>
    <path class="cls-4" fill="url(#rightEarGradient)" d="m113.4 54.1c-0.1-1.6 0.3-2.1 0.6-2.1 1.4 0 4.9 2.9 5 5.9 0.4 7.9 0.5 13.6-0.1 20.6-1.1 2.3-3.2 4.4-4.4 4.3-1.4-0.1-0.8-6.4-1.1-28.7z"/>
    <path class="cls-5" fill="url(#leftEarGradient)" d="m31.1 54.3c-0.1-1.6-0.5-2.3-0.8-2.3-1 0-3.6 1.8-4.9 5-1 4.2-1.4 18.2-0.4 21.9 1.2 2.2 2.9 3.9 4.5 4 1.5 0.1 1.2-6.4 1.6-28.6z"/>
    <path class="cls-7" fill="url(#rightCyanRim)" d="m118.7 56.5c2.8 4.4 2.6 13.8 1 20.3l-1 2c0.9-4.5 0.7-16.8 0-22.3z"/>
    <path class="cls-6" fill="#0F193C" d="m72 46.2c-13.8 0-21.3 1.3-25.7 4.8-4.3 3.1-8.4 8.2-8.4 16.3 0 14.2 11.1 19.1 33.1 19.1 17.5 0 34.8-1.3 34.8-18.9 0-7.7-4.1-14.2-10.3-17.3-5.4-2.8-12-4-23.5-4z"/>
    <path class="cls-8" fill="url(#screenGradient)" d="m72 48c-13.1 0-19.9 1.4-24.1 4s-8 6.6-8 15c0 12.7 10.1 17.2 31.1 17.2 16 0 32.5-1 32.5-15.7 0-7.4-2.1-12.6-7.9-16.2-4.2-2.6-10.6-4.3-23.6-4.3z"/>
    <g clip-path="url(#screenClip)">
      <rect class="screen-glint" x="41" y="45" width="16" height="45" fill="url(#glintGradient)"/>
      <path fill="#ffffff" opacity=".08" d="m43.1 55.8c6.9-4.4 15.5-5.8 28.9-5.8 13.3 0 21 1.5 26.5 5.4-7.4-1.4-15.3-2-27-2-11.9 0-20.8.8-28.4 2.4z"/>
    </g>
    <g class="eye left">
      <path class="left-eye" fill="url(#leftEyeGradient)" d="m56.7 59c-2.2 0-4.5 1.7-4.7 5.1-0.1 1.5 0 4.6 0.1 5.8 0.3 2.7 2 4.5 4.4 4.5s4.2-1.4 4.7-3.7c0.3-1.7 0.3-6-0.2-8.1-0.5-1.9-2.1-3.6-4.3-3.6z"/>
      <circle cx="58.3" cy="61.9" r="1.2" fill="#fff" opacity=".72"/>
    </g>
    <g class="eye right">
      <path class="cls-9" fill="url(#rightEyeGradient)" d="m87.2 59c-2.2 0-4.7 1.6-4.7 5.9-0.1 5.1 0.1 9.5 4.7 9.5 2 0 4.3-1.3 4.5-4.7 0.1-1.2 0.1-4.2-0.1-6-0.4-3.3-2.4-4.7-4.4-4.7z"/>
      <circle cx="88.9" cy="61.9" r="1.2" fill="#fff" opacity=".72"/>
    </g>
  </g>
</svg>
