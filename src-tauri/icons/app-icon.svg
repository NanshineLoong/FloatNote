<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="background-gradient" cx="28%" cy="16%" r="108%">
      <stop offset="0" stop-color="#e3e8ee"/>
      <stop offset="0.48" stop-color="#aeb9c7"/>
      <stop offset="1" stop-color="#657386"/>
    </radialGradient>
    <linearGradient id="paper-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset="0.58" stop-color="#f5ede2"/>
      <stop offset="1" stop-color="#e9ddce"/>
    </linearGradient>
    <linearGradient id="paper-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#b9ad9f" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="brace-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d8ba0"/>
      <stop offset="1" stop-color="#5f6e83"/>
    </linearGradient>
    <filter id="ambient-blur" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="paper-filter" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow id="paper-shadow" dx="0" dy="27" stdDeviation="24" flood-color="#233044" flood-opacity="0.28"/>
    </filter>
    <filter id="ink-soften" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect id="background" x="0" y="0" width="1024" height="1024" fill="url(#background-gradient)"/>
  <ellipse cx="526" cy="722" rx="352" ry="86" fill="#273447" opacity="0.16" filter="url(#ambient-blur)"/>
  <path d="M74 198 C250 50 662 18 924 158" fill="none" stroke="#ffffff" stroke-width="54" stroke-linecap="round" opacity="0.08" filter="url(#ambient-blur)"/>

  <g transform="rotate(-7 512 512)" filter="url(#paper-filter)">
    <rect id="paper" x="136" y="222" width="752" height="580" rx="67" fill="url(#paper-gradient)" stroke="url(#paper-edge)" stroke-width="7"/>
    <path d="M178 292 C365 244 670 247 839 296" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity="0.23"/>

    <path d="M350 343 C299 343 284 381 291 433 C297 476 277 501 241 512 C277 523 297 548 291 591 C284 643 299 681 350 681" fill="none" stroke="url(#brace-gradient)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M458 430 C548 416 642 401 752 391" fill="none" stroke="#768292" stroke-width="21" stroke-linecap="round" opacity="0.6" filter="url(#ink-soften)"/>
    <path d="M458 548 C548 534 632 520 718 511" fill="none" stroke="#768292" stroke-width="21" stroke-linecap="round" opacity="0.53" filter="url(#ink-soften)"/>
    <path d="M461 424 C554 410 646 397 748 388" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.22"/>
    <path d="M461 542 C547 529 631 516 714 508" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.18"/>
  </g>
</svg>
