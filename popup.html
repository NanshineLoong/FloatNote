<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloatNote Popup</title>
  </head>
  <body>
    <div id="popup" class="popup-root" hidden>
      <div id="popup-empty" class="popup-empty" hidden>未识别到选中文本</div>
      <div id="popup-actions" class="popup-bar" role="toolbar">
        <button id="btn-capture" class="popup-btn popup-btn-primary" type="button">
          <i class="ph ph-quotes popup-btn-icon" aria-hidden="true"></i>
          <span class="popup-btn-label">采集</span>
        </button>
      </div>
    </div>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
